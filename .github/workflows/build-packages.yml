name: Build Packages

on:
  workflow_dispatch:
  watch:
    types: started
  repository_dispatch:
    types: build

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    name: Build ${{ matrix.arch }}-${{ matrix.tag }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
        tag:
          - openwrt-24.10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Source
        run: |
          # curl
          git clone https://github.com/openwrt/packages -b openwrt-24.10 --depth=1
          mv packages/net/curl curl
          rm -rf packages
          # enable openssl & nghttp3 & ngtcp2
          sed -i 's/default LIBCURL_MBEDTLS/default LIBCURL_OPENSSL/g' curl/Config.in
          sed -i -E '/LIBCURL_NG(HTTP3|TCP2)/,/default n/s/default n/default y/' curl/Config.in
          # version
          curl_version=$(grep -Po '(?<=PKG_VERSION:=).*' curl/Makefile)
          echo "curl_version=$curl_version" >> "$GITHUB_ENV"
          # depends
          git clone https://github.com/sbwml/package_libs_ngtcp2 ngtcp2
          git clone https://github.com/sbwml/package_libs_nghttp3 nghttp3
          # openssl with QUIC support from sbwml feed
          git clone https://github.com/sbwml/r4s_build_script -b openwrt-24.10 --depth=1 build_script
          if [ -d build_script/packages/libs/openssl ]; then
            cp -a build_script/packages/libs/openssl .
          else
            # fallback: use standard openssl from OpenWrt
            git clone https://github.com/openwrt/openwrt -b openwrt-24.10 --depth=1
            cp -a openwrt/package/libs/openssl .
            rm -rf openwrt
            # apply QUIC patches if available
            if [ -d build_script/openwrt/patch/openssl/quic ]; then
              mkdir -p openssl/patches
              cp build_script/openwrt/patch/openssl/quic/*.patch openssl/patches/
            fi
          fi
          rm -rf build_script

      - name: Build Packages
        uses: sbwml/openwrt-gh-action-sdk@curl
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.tag }}
          FEEDNAME: packages_ci
          PACKAGES: curl
          NO_REFRESH_CHECK: true
          IGNORE_ERRORS: false
          V: s

      - name: Show build error logs on failure
        if: failure()
        run: |
          echo "=== Build Failed - Showing error details ==="
          echo ""
          echo "=== Looking for build errors in logs ==="
          if [ -d /builder ]; then
            # Show config errors
            find /builder/build_dir -name "config.log" -exec echo "\n--- {} ---" \; -exec tail -100 {} \; 2>/dev/null || true
            # Show make errors from build directories
            find /builder/build_dir -type f -name ".log" -exec echo "\n--- {} ---" \; -exec tail -100 {} \; 2>/dev/null || true
          fi
          echo ""
          echo "=== Failed packages directories ==="
          ls -la /builder/build_dir/target-* 2>/dev/null | grep -E "curl|openssl|ngtcp2|nghttp3|boringssl" || echo "No matching directories found"

      - name: Create compress files
        run: |
          tar -zcvf curl-${{ env.curl_version }}-${{ matrix.arch }}.tar.gz -C bin/packages/${{ matrix.arch }}/ packages_ci

      - name: Release packages
        uses: ncipollo/release-action@v1
        with:
          name: curl-${{ env.curl_version }}
          commit: main
          tag: ${{ env.curl_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "curl-${{ env.curl_version }}-${{ matrix.arch }}.tar.gz"
