name: Build Packages

on:
  workflow_dispatch:
  watch:
    types: started
  repository_dispatch:
    types: build

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    name: Build ${{ matrix.arch }}-${{ matrix.tag }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - mipsel_24kc
          - x86_64
        tag:
          - openwrt-24.10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Source
        run: |
          git clone https://github.com/sbwml/feeds_packages_net_curl --depth=1 curl
          curl_version=$(grep -Po '(?<=PKG_VERSION:=).*' curl/Makefile)
          echo "curl_version=$curl_version" >> "$GITHUB_ENV"

          # Configure curl for OpenSSL + QUIC support
          sed -i 's/default LIBCURL_MBEDTLS/default LIBCURL_OPENSSL/g' curl/Config.in
          sed -i -E '/LIBCURL_NG(HTTP3|TCP2)/,/default n/s/default n/default y/' curl/Config.in
          sed -i '/config LIBCURL_OPENSSL_QUIC/,+3 s/default n/default y/' curl/Config.in

          # Add required custom package definitions
          git clone https://github.com/sbwml/package_libs_nghttp3 --depth=1 nghttp3
          git clone https://github.com/sbwml/package_libs_ngtcp2 --depth=1 ngtcp2
          git clone https://github.com/sbwml/package_libs_openssl -b openssl-3.2 --depth=1 openssl

      - name: Prepare build environment
        run: |
          echo "ARCH=${{ matrix.arch }} TAG=${{ matrix.tag }}"
          [ -d curl ] || exit 1
          grep "PKG_VERSION" curl/Makefile | head -1

      - name: Build curl with QUIC support (curl depends on nghttp3, ngtcp2, OpenSSL)
        uses: sbwml/openwrt-gh-action-sdk@curl
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.tag }}
          FEEDNAME: packages_ci
          PACKAGES: curl
          NO_REFRESH_CHECK: true
          IGNORE_ERRORS: false

      - name: Create compress files
        run: |
          mkdir -p bin/packages/${{ matrix.arch }}/packages_ci
          cp install_h3.sh bin/packages/${{ matrix.arch }}/packages_ci/
          tar -zcvf curl-${{ env.curl_version }}-${{ matrix.arch }}.tar.gz -C bin/packages/${{ matrix.arch }}/ packages_ci

      - name: Release packages
        uses: ncipollo/release-action@v1
        with:
          name: curl-${{ env.curl_version }}
          commit: main
          tag: ${{ env.curl_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "curl-${{ env.curl_version }}-${{ matrix.arch }}.tar.gz"
