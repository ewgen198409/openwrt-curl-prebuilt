name: Build Packages

on:
  workflow_dispatch:
  watch:
    types: started
  repository_dispatch:
    types: build

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    name: Build ${{ matrix.arch }}-${{ matrix.tag }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
        tag:
          - openwrt-24.10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Source
        run: |
          # Use sbwml's pre-configured packages with QUIC support
          # These packages have already been tested and verified to work together
          
          echo "Fetching curl package with QUIC support..."
          git clone https://github.com/sbwml/feeds_packages_net_curl --depth=1 curl_source
          
          # Extract version from the package
          curl_version=$(grep -Po '(?<=PKG_VERSION:=).*' curl_source/Makefile)
          echo "curl_version=$curl_version" >> "$GITHUB_ENV"
          echo "Successfully configured to build curl version: $curl_version"
          
          # Copy to workspace root
          mv curl_source curl
          
          echo ""
          echo "=== Build configuration ready ==="
          echo "Using sbwml's pre-configured packages:"
          echo "  - curl (with QUIC support)"
          echo "  - nghttp3"
          echo "  - ngtcp2"
          echo "  - OpenSSL (with QUIC patches)"
          echo "======================================="

      - name: Prepare build environment
        run: |
          echo "=== Build Environment Ready ==="
          echo "Architecture: ${{ matrix.arch }}"
          echo "OpenWrt Version: ${{ matrix.tag }}"
          echo "Using sbwml's pre-tested packages with QUIC support"
          
          # Verify curl package is ready
          if [ -d curl ]; then
            echo "✓ curl package found"
            grep "PKG_VERSION" curl/Makefile | head -1
          else
            echo "✗ curl package not found"
            exit 1
          fi

      - name: Build curl with QUIC support (curl depends on nghttp3, ngtcp2, OpenSSL)
        uses: sbwml/openwrt-gh-action-sdk@curl
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.tag }}
          FEEDNAME: packages_ci
          PACKAGES: curl
          NO_REFRESH_CHECK: true
          IGNORE_ERRORS: false
          V: s

      - name: Show build error logs on failure
        if: failure()
        run: |
          echo "=== Build Failed - Diagnostic Information ==="
          echo ""
          echo "=== Current working directory structure ==="
          ls -la
          echo ""
          
          if [ -d /builder ]; then
            echo "=== Builder directory structure ==="
            ls -la /builder/ | head -20
            echo ""
            
            echo "=== Looking for compilation errors ==="
            find /builder/build_dir -name "config.log" -exec echo "--- {} ---" \; -exec tail -50 {} \; 2>/dev/null || true
            
            echo ""
            echo "=== Build directory contents (curl, openssl, ngtcp2, nghttp3) ==="
            find /builder/build_dir -maxdepth 2 -type d \( -name "*curl*" -o -name "*openssl*" -o -name "*ngtcp2*" -o -name "*nghttp3*" \) 2>/dev/null | sort
            
            echo ""
            echo "=== Recent build output (last 150 lines) ==="
            find /builder/build_dir -name "Makefile" -path "*/curl/*" -exec dirname {} \; | head -1 | xargs -I {} sh -c 'make -C {} 2>&1 | tail -150' 2>/dev/null || echo "Could not retrieve make output"
          fi
          
          echo ""
          echo "=== Staging directory check ==="
          ls -la /builder/staging_dir/target-*/usr/include/ 2>/dev/null | grep -E "openssl|curl" | head -20 || echo "No OpenSSL/curl headers found in staging"
          ls -la /builder/staging_dir/target-*/usr/lib/ 2>/dev/null | grep -E "ssl|crypto" | head -20 || echo "No SSL libraries found in staging"

      - name: Create compress files
        run: |
          tar -zcvf curl-${{ env.curl_version }}-${{ matrix.arch }}.tar.gz -C bin/packages/${{ matrix.arch }}/ packages_ci

      - name: Release packages
        uses: ncipollo/release-action@v1
        with:
          name: curl-${{ env.curl_version }}
          commit: main
          tag: ${{ env.curl_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "curl-${{ env.curl_version }}-${{ matrix.arch }}.tar.gz"
