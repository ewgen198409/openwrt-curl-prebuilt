name: Build Packages

on:
  workflow_dispatch:
  watch:
    types: started
  repository_dispatch:
    types: build

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    name: Build ${{ matrix.arch }}-${{ matrix.openwrt }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - x86_64
        openwrt:
          - '24.10'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Source
        run: |
          git clone https://github.com/sbwml/feeds_packages_net_curl --depth=1 curl_source
          curl_version=$(grep -Po '(?<=PKG_VERSION:=).*' curl_source/Makefile)
          echo "curl_version=$curl_version" >> "$GITHUB_ENV"
          mv curl_source curl

      - name: Prepare build environment
        run: |
          echo "ARCH=${{ matrix.arch }} OPENWRT=${{ matrix.openwrt }}"
          [ -d curl ] || exit 1
          grep "PKG_VERSION" curl/Makefile | head -1

      - name: Build curl with QUIC support (curl depends on nghttp3, ngtcp2, OpenSSL)
        uses: sbwml/openwrt-gh-action-sdk@curl
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.openwrt }}
          FEEDNAME: packages_ci
          PACKAGES: curl
          NO_REFRESH_CHECK: true
          IGNORE_ERRORS: false
          V: s

      - name: Show build error logs on failure
        if: failure()
        run: |
          echo "=== Build Failed ==="
          find /builder/build_dir -name "config.log" -exec echo "--- {} ---" \; -exec tail -20 {} \; 2>/dev/null || true
          find /builder/build_dir -type f -name ".log" -exec echo "--- {} ---" \; -exec tail -20 {} \; 2>/dev/null || true

      - name: Create compress files
        run: |
          tar -zcvf curl-${{ env.curl_version }}-${{ matrix.arch }}-${{ matrix.openwrt }}.tar.gz -C bin/packages/${{ matrix.arch }}/ packages_ci

      - name: Release packages
        uses: ncipollo/release-action@v1
        with:
          name: curl-${{ env.curl_version }}-${{ matrix.arch }}-${{ matrix.openwrt }}
          commit: main
          tag: ${{ env.curl_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "curl-${{ env.curl_version }}-${{ matrix.arch }}-${{ matrix.openwrt }}.tar.gz"
